<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Flafka - Coming Soon</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    .container { text-align: center; padding: 2rem; }
    .logo {
      max-width: 400px;
      width: 80vw;
      margin-bottom: 2rem;
      filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.15));
    }
    .blink {
      font-size: 3rem;
      color: #e94560;
      text-transform: uppercase;
      letter-spacing: 0.3em;
      animation: blink 1s ease-in-out infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
  </style>
</head>
<body>
  <main class="container">
    <img src="fob-logo-sm.png" class="logo" alt="Flafka logo" />
    <h1 class="blink">Coming Soon</h1>
  </main>
</body>
</html>
